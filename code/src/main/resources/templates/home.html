<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="base">
<head>
    <div th:replace="~{fragments/myhead :: myhead}"></div>
    <title>ViGameList</title>
</head>
<body>
    <div th:replace="~{fragments/navbar :: mynavbar}"></div>
    <main class="container">
        <div class="pb-3">
            <h1><strong>Welcome to ViGameList!</strong></h1>
            <h3 class="mr-5">Search for games, rate them, review them, look for informations you are struggling to find...
                Everything is here!
            </h3>
        </div>
        <a href="" class="btn btn-dark btn-lg">Discover</a>

        <div class="row justify-content-center mt-4">
            <div class="col-md-5">
                <form action="" class="d-flex gap-2">
                    <input type="search" class="form-control border-2" placeholder="Search">
                    <button type="submit" class="btn btn-outline-dark">Search</button>
                </form>
            </div>
        </div>

        <div class="mb-3">
            <h1><strong>Most popular</strong></h1>
            <div class="d-flex flex-row gap-3">
                <div class="d-flex flex-column align-items-center text-center">
                    <img class="rounded mb-2" th:src="@{/images/jour8.webp}" alt="Game Image" style="width: 45%;">
                    <h3>Placeholder</h3>
                </div>
                <div class="d-flex flex-column align-items-center text-center">
                    <img class="rounded mb-2" th:src="@{/images/jour8.webp}" alt="Game Image" style="width: 45%;">
                    <h3>Placeholder</h3>
                </div>
                <div class="d-flex flex-column align-items-center text-center">
                    <img class="rounded mb-2" th:src="@{/images/jour8.webp}" alt="Game Image" style="width: 45%;">
                    <h3>Placeholder</h3>
                </div>
            </div>
        </div>

        <div class="">
            <h1><strong>Recommandations</strong></h1>
            <h2>FPS Games</h2>

            <div class="d-flex flex-row gap-3">
                <div class="d-flex flex-column align-items-center text-center">
                    <img class="rounded mb-2" th:src="@{/images/jour8.webp}" alt="Game Image" style="width: 20%;">
                    <h3>Placeholder</h3>
                </div>
            </div>
        </div>
        
    </main>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
